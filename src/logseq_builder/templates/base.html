<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  {% if config.description %}<meta name="description" content="{{ config.description }}">{% endif %}
  {% if config.author %}<meta name="author" content="{{ config.author }}">{% endif %}
  <link rel="stylesheet" href="style.css">
  {% if config.rss %}
  <link rel="alternate" type="application/rss+xml" title="{{ config.blog_title }} — {{ config.title }}" href="feed.xml">
  {% endif %}
</head>
<body>
  {% include 'partials/header.html' %}
  <div class="layout">
    {% include 'partials/menu.html' %}
    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>
  {% include 'partials/footer.html' %}
  <script src="js/main.js"></script>
</body>
</html>
